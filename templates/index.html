<!DOCTYPE html>
<html>

<head>
    <title>Digit Recognition AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>🖌️ Handwritten Digit Recognition AI</h1>
        <p class="instructions">Draw a number (0-9) inside the box below and click Predict</p>

        <canvas id="canvas" width="280" height="280"></canvas>

        <div class="buttons">
            <button onclick="predict()">Predict</button>
            <button onclick="clearCanvas()">Clear</button>
        </div>

        <h2 id="result" class="result-box"></h2>
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // Set white background initially
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Drawing settings
        ctx.lineWidth = 20;
        ctx.lineCap = "round";
        ctx.strokeStyle = "black";

        let drawing = false;

        canvas.addEventListener("mousedown", () => {
            drawing = true;
            ctx.beginPath();
        });

        canvas.addEventListener("mouseup", () => {
            drawing = false;
            ctx.beginPath();
        });

        canvas.addEventListener("mousemove", draw);

        function draw(e) {
            if (!drawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function clearCanvas() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById("result").innerText = "";
        }

        function predict() {
            let image = canvas.toDataURL("image/png");

            fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: image })
            })
                .then(res => res.json())
                .then(data => {
                    document.getElementById("result").innerHTML =
                        "<div class='digit'>" + data.digit + "</div>" +
                        "<div class='confidence'>Confidence: " + data.confidence + "%</div>";
                });
        }
    </script>
</body>

</html>
